name: tekartik_firebase_firestore_grpc_rest
description: Firestore listen implementation over REST / gRPC
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.12.0

dependencies:
  tekartik_firebase_firestore:
    git:
      url: https://github.com/tekartik/firebase_firestore.dart
      path: firestore
    version: '>=0.8.2'
  tekartik_firebase_firestore_rest:
    path: ../firestore_rest
  tekartik_firebase_auth:
    git:
      url: https://github.com/tekartik/firebase_auth.dart
      path: auth
    version: '>=0.9.0'
  tekartik_firebase_auth_rest:
    path: ../auth_rest
  tekartik_firebase_rest:
    git:
      url: https://github.com/tekartik/firebase_rest.dart
      path: firebase_rest
    version: '>=0.7.4'
  googleapis: '>=12.0.0'
  path: ">=1.9.1"
  http:
  grpc: ">=3.2.4"
  googleapis_auth: ">=1.4.0"
  protobuf: ">=3.1.0"

dev_dependencies:
  fixnum: ">=1.1.0"
  test: ">=1.31.0"
  dev_build: ">=1.1.7+3"
  tekartik_firebase_local:
    git:
      url: https://github.com/tekartik/firebase.dart
      path: firebase_local
    version: '>=0.6.3'
  tekartik_common_utils:
    git:
      url: https://github.com/tekartik/common_utils.dart
    version: '>=0.10.7'
  tekartik_firebase_firestore_test:
    git:
      url: https://github.com/tekartik/firebase_firestore.dart
      path: firestore_test
    version: '>=0.7.4'

resolution: workspace
